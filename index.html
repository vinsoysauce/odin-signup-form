<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Sign-Up Form</title>
</head>
<body>
    <div class="image-sidebar">
        <img class="fern-background" src="./images/halie-west-25xggax4bSA-unsplash.jpg"
        alt="fern in a soil with wet leaves">
        <div class="odin-header">
        <img class="odin-logo" src="./images/odin-lined.png" alt="odin project logo">
        <h1 class="odin-logo-text">ODIN</h1>
        </div>
        <div class="footer-credit">
        <p class="credit">Photo by <a href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie West</a> on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a></p>
        </div>
    </div>
    <content>
        <div>
        <h3 class="quotes">
            This is not a real online service! You know you need something
            like this in your life to help you realize your deepest dreams.
            <br>
            <br>
            Sign up <i>now</i> to get started.
            <br>
            <br>
            You <i>know</i> you want to.
        </h3>
        </div>
        <section class="form-container">
            <legend>Let's do this!</legend>
            <form action="/my-handling-form-page" method="post">
                <div class="form-input-container">
                <div class="first-row-form">
                <p>
                    <label for="first_name">FIRST NAME</label><br>
                    <input type="text" id="first_name" name="first_name" required/>
                </p>
                <p>
                    <label for="email">EMAIL</label><br>
                    <input type="email" id="email" name="email" required/>
                </p>
                <p>
                    <label for="password">PASSWORD</label><br>
                    <input type="password" id="password" name="password" required/>
                </p>
                </div>
                <div class="second-row-form">
                <p>
                    <label for="last_name">LAST NAME</label><br>
                    <input type="text" id="last_name" name="last_name" minlength="8" required/>
                </p>
                <p>
                    <label for="phone">PHONE NUMBER</label><br>
                    <input type="tel" id="phone" name="phone" \
                    pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" required />
                </p>
                <p>
                    <label for="password">CONFIRM PASSWORD</label><br>
                    <input type="password" id="password" name="password" minlength="8" required/>
                </p>
                </div>
                </div>
            </section>            
        </div>
        <div class="button-container">
            <input class="create-account" type="submit" value="Create Account" />
            <p>Already have an account? <a class="login" href="url">Log in</a></p>
        </div>
    </content>
</body>
</html>
